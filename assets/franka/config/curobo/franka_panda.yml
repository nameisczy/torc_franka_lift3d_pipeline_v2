##
## Phase 4.3 Franka Panda CuRobo replacement config.
##
## Source asset family:
##   /mnt/ssd/ziyaochen/torc_franka_lift3d_pipeline_v2/assets/franka
##
## This file intentionally contains no legacy robot or legacy gripper
## end-effector names. It is the planning-side robot contract paired with the
## MuJoCo robosuite Panda asset used by Phase 4.1/4.2.
## The panda_tcp fixed joint includes the robosuite right_gripper yaw so that
## CuRobo's ee_link frame matches gripper0_right_grip_site in MuJoCo.
##

robot_cfg:
  kinematics:
    usd_path: ""
    usd_robot_root: "/robot"
    isaac_usd_path: ""
    usd_flip_joints: {}
    usd_flip_joint_limits: []

    urdf_path: "/mnt/ssd/ziyaochen/torc_franka_lift3d_pipeline_v2/assets/franka/urdf/franka_panda_phase4.urdf"
    asset_root_path: "/mnt/ssd/ziyaochen/torc_franka_lift3d_pipeline_v2/assets/franka"

    base_link: "panda_link0"
    ee_link: "panda_tcp"
    link_names: null
    lock_joints:
      gripper0_right_finger_joint1: 0.04
      gripper0_right_finger_joint2: -0.04
    extra_links: null

    collision_link_names: [
