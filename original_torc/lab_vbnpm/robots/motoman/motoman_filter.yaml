# This is an example filter config for a commercial robot that use Velodyne VLP-16.
cloud_filter_chain:
  # Only containment filtering
  - name: robot_body_filter_containment
    type: robot_body_filter/RobotBodyFilterPointCloud2
    params:
      transforms/timeout/reachable: 0.2
      transforms/timeout/unreachable: 0.4
      debug/pcl/clip: false
      debug/pcl/inside: true
      debug/pcl/shadow: false
      sensor/min_distance: 0.05
      sensor/max_distance: 10
      # For more information of how to choose the fixed frame and configure point_by_point, see the discussion at https://github.com/peci1/robot_body_filter/pull/18#discussion_r780655811
      sensor/point_by_point: false
      frames/fixed: base_link
      frames/sensor: ""
      # Frame of the sensor. If set to empty string, it will be read from header.frame_id of each incoming message. 
      # In LaserScan version, if nonempty, it has to match the frame_id of the incoming scans. 
      # In PointCloud2 version, the data can come in a different frame from frames/sensor.
      # frames/filtering: lidar_frame
      # frames/output: lidar_frame
      body_model/inflation/scale: 1.0
      body_model/inflation/padding: 0.03
      body_model/inflation/per_link/padding:
        robotiq_arg2f_base_link: 0.1
        left_outer_knuckle: 0.1
        left_outer_finger: 0.1
        left_inner_finger: 0.1
        left_inner_finger_pad: 0.1
        left_inner_knuckle: 0.1
        right_outer_knuckle: 0.1
        right_outer_finger: 0.1
        right_inner_finger: 0.1
        right_inner_finger_pad: 0.1
        right_inner_knuckle: 0.1
      body_model/robot_description_param: robot_description
      filter/do_clipping: true
      filter/do_contains_test: true
      filter/do_shadow_test: false
      # only_links:
      #   - base_link
      #   - gps_link
      #   - imu_link
      #   - lidar_mount_link
      #   - top
